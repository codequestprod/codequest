{% extends "base.html" %}

{% block content %}

<div class="card">

    <h2>Create Account</h2>

    <form method="POST">

        <input
            type="text"
            name="username"
            placeholder="Username"
            required
        >

        <br><br>

        <input
            type="email"
            name="email"
            placeholder="Email"
            required
        >

        <br><br>

        <input
            type="password"
            id="password"
            name="password"
            placeholder="Password"
            required
        >

        <br><br>

        <input
            type="password"
            id="confirm_password"
            name="confirm_password"
            placeholder="Confirm Password"
            required
        >

        <br><br>

        <button type="button" onclick="togglePassword()">
            Show / Hide Password
        </button>

        <br><br>

        <button type="submit">
            Create Account
        </button>

    </form>

</div>

<script>
function togglePassword() {
    const pw = document.getElementById("password");
    const cpw = document.getElementById("confirm_password");

    const newType = pw.type === "password" ? "text" : "password";

    pw.type = newType;
    cpw.type = newType;
}
</script>

{% endblock %}
